<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéVault — Ma Collection</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PokéVault">
  <meta name="theme-color" content="#ffcb05">
  <link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a; --surface: #161929; --surface2: #1e2236;
    --border: #2a2f4a; --accent: #ffcb05; --accent2: #3b4cca;
    --red: #e53935; --text: #e8eaf6; --text2: #8892b0;
    --green: #4ecca3; --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; top: -200px; right: -200px;
    width: 600px; height: 600px; pointer-events: none; z-index: 0;
    background: radial-gradient(circle, rgba(59,76,202,0.12) 0%, transparent 70%);
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 200;
    background: rgba(13,15,26,0.95); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; gap: 12px; height: 60px;
  }
  .pokeball {
    width: 32px; height: 32px; flex-shrink: 0;
    background: conic-gradient(var(--red) 180deg, #fff 180deg);
    border-radius: 50%; border: 3px solid #fff; position: relative;
  }
  .pokeball::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 9px; height: 9px; background: #fff; border-radius: 50%; border: 2px solid #444;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  nav { display: flex; gap: 2px; margin-left: auto; flex-wrap: wrap; }
  .nav-btn {
    background: none; border: none; color: var(--text2);
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.82rem;
    padding: 7px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s;
  }
  .nav-btn:hover, .nav-btn.active { background: var(--surface2); color: var(--accent); }

  /* LAYOUT */
  main { position: relative; z-index: 1; padding: 24px 20px; max-width: 1300px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px;
    color: var(--text); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    position: relative; overflow: hidden; transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .stat-label { font-size: 0.72rem; color: var(--text2); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); line-height: 1; }
  .stat-sub   { font-size: 0.77rem; color: var(--text2); margin-top: 4px; }

  /* CHARTS */
  .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
  @media (max-width: 680px) { .chart-section { grid-template-columns: 1fr; } }
  .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .chart-title { font-weight: 800; margin-bottom: 14px; font-size: 0.82rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

  /* SEARCH */
  .search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 200px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    padding: 11px 16px; border-radius: 10px; outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text2); }

  /* BUTTONS */
  .btn {
    background: linear-gradient(135deg, var(--accent), #e09800);
    color: #0d0f1a; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.88rem; border: none;
    padding: 11px 18px; border-radius: 10px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* RESULTS GRID */
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 14px; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: transform 0.2s, border-color 0.2s; position: relative;
  }
  .result-card:hover { transform: translateY(-4px); border-color: var(--accent); }
  .result-card img { width: 100%; display: block; }
  .result-placeholder { height: 110px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
  .result-body { padding: 10px; }
  .result-name { font-weight: 700; font-size: 0.82rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-set  { font-size: 0.7rem; color: var(--text2); margin-bottom: 7px; }
  .price-row   { display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; margin-bottom: 2px; }
  .price-lbl   { color: var(--text2); }
  .p-avg   { color: var(--green);  font-weight: 800; font-size: 0.9rem; }
  .p-low   { color: var(--text2);  font-weight: 700; }
  .p-trend { color: var(--accent); font-weight: 700; }
  .add-btn {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent); color: #0d0f1a; border: none;
    width: 26px; height: 26px; border-radius: 50%;
    font-size: 1.1rem; font-weight: 900; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .result-card:hover .add-btn { opacity: 1; }

  /* COLLECTION GRID */
  .coll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px,1fr)); gap: 14px; }
  .coll-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative; cursor: pointer;
  }
  .coll-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(255,203,5,0.1); }
  .coll-card img { width: 100%; display: block; }
  .coll-placeholder { height: 110px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
  .coll-body { padding: 10px; }
  .coll-name  { font-weight: 700; font-size: 0.8rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .coll-set   { font-size: 0.68rem; color: var(--text2); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .coll-unit  { font-size: 0.78rem; color: var(--green); font-weight: 800; }
  .coll-total { font-size: 0.72rem; color: var(--accent); font-weight: 700; }
  .badge-qty {
    position: absolute; top: 7px; left: 7px;
    background: var(--accent2); color: #fff;
    border-radius: 6px; padding: 2px 7px; font-size: 0.7rem; font-weight: 800;
  }
  .btn-del {
    position: absolute; top: 7px; right: 7px;
    background: var(--red); color: #fff; border: none;
    border-radius: 50%; width: 22px; height: 22px; font-size: 0.75rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .coll-card:hover .btn-del { opacity: 1; }

  /* RARITY BADGE */
  .rarity { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 0.67rem; font-weight: 700; }
  .r-common    { background: #333;    color: #aaa; }
  .r-uncommon  { background: #1a4a2e; color: var(--green); }
  .r-rare      { background: #162050; color: #7ab4f8; }
  .r-ultrarare { background: #38104e; color: #d084fc; }
  .r-secret    { background: #4a2a06; color: var(--accent); }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.75rem; padding: 5px 12px;
    border-radius: 20px; cursor: pointer; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #0d0f1a; border-color: var(--accent); }

  /* MANUAL FORM */
  .manual-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 480px; }
  .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 20px; letter-spacing: 1px; }
  .form-group { margin-bottom: 14px; }
  .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  input[type=text], input[type=number], input[type=url], select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.92rem;
    padding: 9px 13px; border-radius: 9px; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.78); display: flex;
    align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(6px);
  }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; max-width: 420px; width: 100%;
    overflow: hidden; animation: fadeUp 0.2s ease;
  }
  .modal-head {
    background: linear-gradient(135deg, var(--accent2), #0d0f1a);
    padding: 20px; display: flex; gap: 16px; align-items: flex-start;
  }
  .modal-head img { width: 90px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
  .modal-head-placeholder {
    width: 90px; height: 125px; background: var(--surface2);
    border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3rem; flex-shrink: 0;
  }
  .modal-card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent); letter-spacing: 1px; line-height: 1; margin-bottom: 4px; }
  .modal-card-set  { color: var(--text2); font-size: 0.78rem; margin-bottom: 8px; }
  .modal-body { padding: 20px; }
  .modal-prices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .modal-price-box { background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; }
  .modal-price-lbl { font-size: 0.68rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .modal-price-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; }
  .modal-edit-row  { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
  .modal-edit-row label { margin: 0; white-space: nowrap; }
  .modal-actions   { display: flex; gap: 8px; }


  /* SYNC BAR */
  .sync-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .sync-hint { font-size:0.78rem; color:var(--text2); }
  /* MISC */
  .loading { text-align: center; padding: 48px 20px; color: var(--text2); }
  .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 56px 20px; color: var(--text2); }
  .empty-icon { font-size: 3rem; margin-bottom: 10px; }
  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 2000;
    background: var(--surface2); border: 1px solid var(--green);
    color: var(--green); padding: 11px 18px; border-radius: 10px;
    font-weight: 700; font-size: 0.88rem; pointer-events: none;
    animation: toastIn 0.25s ease, toastOut 0.3s ease 2.2s forwards;
  }
  .toast.warn { border-color: var(--red); color: var(--red); }
  @keyframes toastIn  { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: none; } }
  @keyframes toastOut { to   { opacity:0; transform: translateY(16px); } }
</style>
</head>
<body>

<header>
  <div class="pokeball"></div>
  <div class="logo">PokéVault</div>
  <nav>
    <button class="nav-btn active" onclick="showView('dashboard',this)">📊 Dashboard</button>
    <button class="nav-btn"        onclick="showView('search',this)">🔍 Rechercher</button>
    <button class="nav-btn"        onclick="showView('collection',this)">📦 Collection</button>
    <button class="nav-btn"        onclick="showView('manual',this)">✏️ Ajouter</button>
  </nav>
</header>

<main>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="view active">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-section">
      <div class="chart-box">
        <div class="chart-title">📈 Valeur par extension</div>
        <canvas id="chart-sets" height="220"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-title">💎 Répartition par rareté</div>
        <canvas id="chart-rarity" height="220"></canvas>
      </div>
    </div>
    <div class="section-title">⭐ Top cartes les plus précieuses</div>
    <div class="coll-grid" id="top-cards"></div>
  </div>

  <!-- SEARCH -->
  <div id="view-search" class="view">
    <div class="section-title">🔍 Rechercher une carte Pokémon</div>
    <div class="search-bar">
      <input id="search-input" class="search-input"
             placeholder="Ex : Dracaufeu, Pikachu VMAX, Lugia..."
             onkeydown="if(event.key==='Enter') doSearch()">
      <button class="btn" onclick="doSearch()">Rechercher</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- COLLECTION -->
  <div id="view-collection" class="view">
    <div class="section-title">📦 Ma Collection</div>
    <div class="sync-bar">
      <button class="btn" onclick="exportJSON()">⬇️ Exporter</button>
      <label class="btn btn-secondary" style="cursor:pointer">
        ⬆️ Importer
        <input type="file" id="import-file" accept=".json" onchange="importJSON(event)" style="display:none">
      </label>
      <span class="sync-hint">Exportez pour transférer sur un autre appareil</span>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="coll-grid" id="coll-grid"></div>
  </div>

  <!-- MANUAL -->
  <div id="view-manual" class="view">
    <div class="section-title">✏️ Ajouter une carte manuellement</div>
    <div class="manual-form">
      <div class="form-title">Nouvelle carte</div>
      <div class="form-group">
        <label>Nom de la carte *</label>
        <input type="text" id="f-name" placeholder="Ex : Dracaufeu ex">
      </div>
      <div class="form-group">
        <label>Extension / Set</label>
        <input type="text" id="f-set" placeholder="Ex : Écarlate et Violet">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rareté</label>
          <select id="f-rarity">
            <option value="common">Commune</option>
            <option value="uncommon">Peu commune</option>
            <option value="rare">Rare</option>
            <option value="ultrarare" selected>Ultra Rare</option>
            <option value="secret">Secrète</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quantité</label>
          <input type="number" id="f-qty" min="1" value="1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cote estimée (€)</label>
          <input type="number" id="f-value" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Condition</label>
          <select id="f-condition">
            <option>Mint</option>
            <option selected>Near Mint</option>
            <option>Excellent</option>
            <option>Bon état</option>
            <option>Abîmée</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Image URL (optionnel)</label>
        <input type="url" id="f-img" placeholder="https://...">
      </div>
      <button class="btn" style="width:100%;margin-top:4px" onclick="addManualCard()">➕ Ajouter à la collection</button>
    </div>
  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
'use strict';

// ─── ÉTAT ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'pokevault_v3';
let collection   = [];
let activeFilter = 'Tous';
const charts     = {};

const RARITY_LABELS = { common:'Commune', uncommon:'Peu commune', rare:'Rare', ultrarare:'Ultra Rare', secret:'Secrète' };
const RARITY_CLASS  = { common:'r-common', uncommon:'r-uncommon', rare:'r-rare', ultrarare:'r-ultrarare', secret:'r-secret' };

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(collection)); }
  catch(e) { console.warn('localStorage error', e); }
}
function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); collection = r ? JSON.parse(r) : []; }
  catch(e) { collection = []; }
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function showView(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'dashboard')  renderDashboard();
  if (id === 'collection') renderCollection();
}

// ─── RECHERCHE API ────────────────────────────────────────────────────────────
async function doSearch() {
  const q  = document.getElementById('search-input').value.trim();
  if (!q) return;
  const el = document.getElementById('search-results');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><div>Recherche en cours…</div></div>';
  try {
    const url  = `https://api.pokemontcg.io/v2/cards?q=name:"${encodeURIComponent(q)}"&pageSize=24&orderBy=-set.releaseDate`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    renderResults(json.data || []);
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>
      <p>Impossible de joindre l'API Pokémon TCG.<br>
      Vérifiez votre connexion ou utilisez la <strong>saisie manuelle</strong>.</p>
      <p style="margin-top:8px;font-size:0.78rem;color:var(--text2)">Erreur : ${esc(e.message)}</p></div>`;
  }
}

function renderResults(cards) {
  const el = document.getElementById('search-results');
  if (!cards.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🃏</div><p>Aucune carte trouvée.</p></div>';
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'results-grid';
  cards.forEach(card => {
    const cm    = card.cardmarket?.prices;
    const tcp   = card.tcgplayer?.prices;
    const avg   = cm?.averageSellPrice ?? tcp?.holofoil?.market ?? tcp?.normal?.market ?? 0;
    const low   = cm?.lowPrice         ?? tcp?.holofoil?.low    ?? tcp?.normal?.low    ?? null;
    const trend = cm?.trendPrice       ?? null;
    const img   = card.images?.small   ?? '';
    const safe  = encodeURIComponent(JSON.stringify(card));

    const div = document.createElement('div');
    div.className = 'result-card';
    div.innerHTML = `
      ${img ? `<img src="${esc(img)}" alt="${esc(card.name)}" loading="lazy">`
            : `<div class="result-placeholder">🃏</div>`}
      <button class="add-btn" title="Ajouter" onclick="addFromAPI(event,'${safe}',${avg})">+</button>
      <div class="result-body">
        <div class="result-name">${esc(card.name)}</div>
        <div class="result-set">${esc(card.set?.name ?? '')} · ${esc(card.rarity ?? '')}</div>
        <div class="price-row"><span class="price-lbl">💶 Cote</span><span class="p-avg">${avg ? avg.toFixed(2)+' €' : '—'}</span></div>
        ${low   ? `<div class="price-row"><span class="price-lbl">📉 Min</span><span class="p-low">${low.toFixed(2)} €</span></div>` : ''}
        ${trend ? `<div class="price-row"><span class="price-lbl">📈 Tendance</span><span class="p-trend">${trend.toFixed(2)} €</span></div>` : ''}
      </div>`;
    grid.appendChild(div);
  });
  el.innerHTML = '';
  el.appendChild(grid);
}

// ─── AJOUTER / SUPPRIMER ──────────────────────────────────────────────────────
function addFromAPI(e, safe, price) {
  e.stopPropagation();
  const card = JSON.parse(decodeURIComponent(safe));
  const rk   = mapRarity(card.rarity ?? '');
  push({
    name      : card.name,
    set       : card.set?.name ?? 'Inconnu',
    rarity    : rk,
    rarityLabel: RARITY_LABELS[rk] ?? card.rarity ?? '',
    qty       : 1,
    value     : price || 0,
    condition : 'Near Mint',
    img       : card.images?.small ?? '',
  });
}

function addManualCard() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('⚠️ Le nom est obligatoire', true); return; }
  const rarity = document.getElementById('f-rarity').value;
  push({
    name,
    set       : document.getElementById('f-set').value.trim() || 'Inconnu',
    rarity,
    rarityLabel: RARITY_LABELS[rarity],
    qty       : Math.max(1, parseInt(document.getElementById('f-qty').value) || 1),
    value     : parseFloat(document.getElementById('f-value').value) || 0,
    condition : document.getElementById('f-condition').value,
    img       : document.getElementById('f-img').value.trim(),
  });
  ['f-name','f-set','f-img'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-qty').value   = 1;
  document.getElementById('f-value').value = '';
}

function push(card) {
  const existing = collection.find(c => c.name === card.name && c.set === card.set);
  if (existing) { existing.qty += card.qty; }
  else { collection.push({ id: Date.now() + Math.random(), addedAt: new Date().toISOString(), ...card }); }
  save();
  toast('✅ ' + card.name + ' ajouté !');
}

function removeCard(id) {
  collection = collection.filter(c => c.id !== id);
  save();
  renderCollection();
  renderDashboard();
  toast('🗑️ Carte supprimée');
}

function updateCard(id, value, qty) {
  const c = collection.find(c => c.id === id);
  if (!c) return;
  if (!isNaN(value) && value >= 0) c.value = value;
  if (!isNaN(qty)   && qty   >= 1) c.qty   = qty;
  save();
  renderCollection();
  renderDashboard();
  toast('💾 Carte mise à jour !');
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const totalUnique = collection.length;
  const totalQty    = collection.reduce((s,c) => s + c.qty, 0);
  const totalValue  = collection.reduce((s,c) => s + c.value * c.qty, 0);
  const avgValue    = totalQty ? totalValue / totalQty : 0;
  const topCard     = [...collection].sort((a,b) => b.value - a.value)[0];

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">🃏 Cartes uniques</div>
      <div class="stat-value">${totalUnique}</div>
      <div class="stat-sub">références différentes</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📦 Exemplaires</div>
      <div class="stat-value">${totalQty}</div>
      <div class="stat-sub">cartes au total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">💶 Valeur totale</div>
      <div class="stat-value">${totalValue.toFixed(0)} €</div>
      <div class="stat-sub">~${avgValue.toFixed(2)} € / carte</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⭐ Plus précieuse</div>
      <div class="stat-value" style="font-size:1.5rem">${topCard ? topCard.value.toFixed(2)+' €' : '—'}</div>
      <div class="stat-sub">${topCard ? esc(topCard.name) : 'Aucune carte'}</div>
    </div>`;

  // Chart sets
  const setMap = {};
  collection.forEach(c => { setMap[c.set] = (setMap[c.set] || 0) + c.value * c.qty; });
  const setLabels = Object.keys(setMap).slice(0,10);
  const setData   = setLabels.map(k => +setMap[k].toFixed(2));
  if (charts.sets) charts.sets.destroy();
  charts.sets = new Chart(document.getElementById('chart-sets').getContext('2d'), {
    type: 'bar',
    data: {
      labels: setLabels.length ? setLabels : ['Aucune donnée'],
      datasets:[{ data: setData.length ? setData : [0], backgroundColor:'rgba(255,203,5,0.65)', borderColor:'#ffcb05', borderWidth:1, borderRadius:6 }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ color:'#8892b0', font:{size:10}, maxRotation:30 }, grid:{ color:'#2a2f4a' } },
        y:{ ticks:{ color:'#8892b0', callback: v => v+'€' }, grid:{ color:'#2a2f4a' } }
      }
    }
  });

  // Chart rarity
  const rc = { common:0, uncommon:0, rare:0, ultrarare:0, secret:0 };
  collection.forEach(c => { if (rc[c.rarity] !== undefined) rc[c.rarity] += c.qty; });
  if (charts.rarity) charts.rarity.destroy();
  charts.rarity = new Chart(document.getElementById('chart-rarity').getContext('2d'), {
    type: 'doughnut',
    data:{
      labels:['Commune','Peu commune','Rare','Ultra Rare','Secrète'],
      datasets:[{ data:[rc.common,rc.uncommon,rc.rare,rc.ultrarare,rc.secret], backgroundColor:['#444','#1a5a3a','#162050','#38104e','#4a2a06'], borderColor:'#161929', borderWidth:2 }]
    },
    options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#8892b0', font:{size:11} } } } }
  });

  // Top 5
  const top5  = [...collection].sort((a,b) => b.value - a.value).slice(0,5);
  const topEl = document.getElementById('top-cards');
  topEl.innerHTML = '';
  if (!top5.length) {
    topEl.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🃏</div><p>Ajoutez des cartes pour voir le top !</p></div>';
    return;
  }
  top5.forEach(c => {
    const el = document.createElement('div');
    el.className = 'coll-card';
    el.innerHTML = cardHTML(c, false);
    el.onclick = () => openModal(c);
    topEl.appendChild(el);
  });
}

// ─── COLLECTION ───────────────────────────────────────────────────────────────
function renderCollection() {
  const sets = ['Tous', ...new Set(collection.map(c => c.set))];
  if (!sets.includes(activeFilter)) activeFilter = 'Tous';
  const fb = document.getElementById('filter-bar');
  fb.innerHTML = '';
  sets.forEach(s => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (s === activeFilter ? ' active' : '');
    b.textContent = s;
    b.onclick = () => { activeFilter = s; renderCollection(); };
    fb.appendChild(b);
  });

  const filtered = activeFilter === 'Tous' ? collection : collection.filter(c => c.set === activeFilter);
  const grid = document.getElementById('coll-grid');
  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📦</div><p>Votre collection est vide.<br>Recherchez ou ajoutez des cartes !</p></div>';
    return;
  }
  filtered.forEach(c => {
    const el = document.createElement('div');
    el.className = 'coll-card';
    el.innerHTML = cardHTML(c, true);
    el.onclick = () => openModal(c);
    grid.appendChild(el);
  });
}

function cardHTML(c, showDel) {
  return `
    ${c.img ? `<img src="${esc(c.img)}" alt="${esc(c.name)}" loading="lazy">` : `<div class="coll-placeholder">🃏</div>`}
    <div class="badge-qty">x${c.qty}</div>
    ${showDel ? `<button class="btn-del" title="Supprimer" onclick="event.stopPropagation();removeCard(${c.id})">✕</button>` : ''}
    <div class="coll-body">
      <div class="coll-name">${esc(c.name)}</div>
      <div class="coll-set">${esc(c.set)}</div>
      <div class="coll-unit">💶 ${c.value.toFixed(2)} € / unité</div>
      ${c.qty > 1 ? `<div class="coll-total">= ${(c.value*c.qty).toFixed(2)} € total</div>` : ''}
      <span class="rarity ${RARITY_CLASS[c.rarity] ?? 'r-common'}" style="margin-top:5px;display:inline-block">${esc(c.rarityLabel)}</span>
    </div>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(c) {
  closeModal();
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'card-modal';
  ov.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        ${c.img ? `<img src="${esc(c.img)}" alt="${esc(c.name)}">` : `<div class="modal-head-placeholder">🃏</div>`}
        <div>
          <div class="modal-card-name">${esc(c.name)}</div>
          <div class="modal-card-set">${esc(c.set)}</div>
          <span class="rarity ${RARITY_CLASS[c.rarity] ?? 'r-common'}">${esc(c.rarityLabel)}</span>
          <div style="margin-top:8px;font-size:0.78rem;color:var(--text2)">Condition : <span style="color:var(--text)">${esc(c.condition)}</span></div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-prices">
          <div class="modal-price-box">
            <div class="modal-price-lbl">Cote unitaire</div>
            <div class="modal-price-val" style="color:var(--green)">${c.value.toFixed(2)} €</div>
          </div>
          <div class="modal-price-box">
            <div class="modal-price-lbl">Total ×${c.qty}</div>
            <div class="modal-price-val" style="color:var(--accent)">${(c.value*c.qty).toFixed(2)} €</div>
          </div>
        </div>
        <div class="modal-edit-row">
          <label>Cote (€)</label>
          <input type="number" id="m-val" step="0.01" min="0" value="${c.value}">
          <input type="number" id="m-qty" min="1" value="${c.qty}" style="width:70px">
        </div>
        <div class="modal-actions">
          <button class="btn" style="flex:1" onclick="applyModal(${c.id})">💾 Enregistrer</button>
          <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Fermer</button>
        </div>
      </div>
    </div>`;
  ov.onclick = e => { if (e.target === ov) closeModal(); };
  document.body.appendChild(ov);
}
function closeModal() { document.getElementById('card-modal')?.remove(); }
function applyModal(id) {
  const val = parseFloat(document.getElementById('m-val').value);
  const qty = parseInt(document.getElementById('m-qty').value);
  updateCard(id, val, qty);
  closeModal();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function mapRarity(r) {
  const s = (r||'').toLowerCase();
  if (s.includes('secret')||s.includes('rainbow')||s.includes('gold')) return 'secret';
  if (s.includes('ultra')||s.includes('vmax')||s.includes('full art')||s.includes(' ex')||s.includes('gx')||s.includes('v ')) return 'ultrarare';
  if (s.includes('holo')||s.includes('rare')) return 'rare';
  if (s.includes('uncommon')) return 'uncommon';
  return 'common';
}

function esc(str) {
  return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, warn=false) {
  const t = document.createElement('div');
  t.className = 'toast' + (warn ? ' warn' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}


// ─── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportJSON() {
  const data = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), collection }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'pokevault_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('⬇️ Collection exportée !');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const cards  = parsed.collection ?? parsed; // supporte tableau direct ou objet
      if (!Array.isArray(cards)) throw new Error('Format invalide');
      const count = cards.length;
      // Fusionner : ajouter les cartes absentes, augmenter qty si déjà présente
      cards.forEach(c => {
        const existing = collection.find(x => x.name === c.name && x.set === c.set);
        if (existing) { existing.qty += c.qty || 1; }
        else { collection.push({ ...c, id: Date.now() + Math.random() }); }
      });
      save();
      renderDashboard();
      renderCollection();
      toast('⬆️ ' + count + ' cartes importées !');
    } catch(err) {
      toast('❌ Fichier invalide : ' + err.message, true);
    }
    // Reset input pour permettre re-import du même fichier
    event.target.value = '';
  };
  reader.readAsText(file);
}

      { id:2, name:'Pikachu VMAX',  set:'Épée et Bouclier',   rarity:'ultrarare', rarityLabel:'Ultra Rare', qty:2, value:28.50,  condition:'Mint',      img:'', addedAt:'' },
      { id:3, name:'Mewtwo GX',     set:'Soleil et Lune',     rarity:'rare',      rarityLabel:'Rare',       qty:1, value:12.00,  condition:'Excellent',  img:'', addedAt:'' },
      { id:4, name:'Ronflex',       set:'Écarlate et Violet', rarity:'common',    rarityLabel:'Commune',    qty:4, value:0.50,   condition:'Bon état',   img:'', addedAt:'' },
      { id:5, name:'Lugia V',       set:'Argent Tempête',     rarity:'secret',    rarityLabel:'Secrète',    qty:1, value:120.00, condition:'Mint',       img:'', addedAt:'' },
    ];

  }
  renderDashboard();

}

init();
