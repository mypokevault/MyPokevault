<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéVault</title>  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcb05">
  <link rel="apple-touch-icon" href="icon.svg">  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body><header>
  <div class="logo">PokéVault</div>
  <nav>
    <button class="nav-btn active" onclick="showView('dashboard',this)">Dashboard</button>
    <button class="nav-btn" onclick="showView('search',this)">Recherche</button>
    <button class="nav-btn" onclick="showView('collection',this)">Collection</button>
    <button class="nav-btn" onclick="showView('manual',this)">Ajouter</button>
  </nav>
</header><main>  <div id="view-dashboard" class="view active">
    <div id="stats-grid"></div>
    <canvas id="chart-sets" height="200"></canvas>
    <canvas id="chart-rarity" height="200"></canvas>
    <div id="top-cards" class="coll-grid"></div>
  </div>  <div id="view-search" class="view">
    <input id="search-input" placeholder="Nom carte">
    <button onclick="doSearch()">Rechercher</button>
    <div id="search-results"></div>
  </div>  <div id="view-collection" class="view">
    <button onclick="exportJSON()">Exporter</button>
    <input type="file" onchange="importJSON(event)">
    <div id="filter-bar"></div>
    <div id="coll-grid" class="coll-grid"></div>
  </div>  <div id="view-manual" class="view">
    <input id="f-name" placeholder="Nom">
    <input id="f-set" placeholder="Set">
    <input id="f-value" type="number" placeholder="Valeur">
    <button onclick="addManualCard()">Ajouter</button>
  </div></main><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script><script src="script.js"></script></body>
</html>
